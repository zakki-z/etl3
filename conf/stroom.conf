worker_processes 1;
error_log /home/HEB-TT/h_zazhari/stroom/nginx/logs/error.log;
pid /home/HEB-TT/h_zazhari/stroom/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    server {
        listen 8080;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /home/HEB-TT/h_zazhari/stroom/nginx/ssl/stroom.crt;
        ssl_certificate_key /home/HEB-TT/h_zazhari/stroom/nginx/ssl/stroom.key;

        root /home/HEB-TT/h_zazhari/stroom/frontend/build;
        index index.html;

        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}